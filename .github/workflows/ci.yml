name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test

jobs:
  # Lint Job
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

  # Test Job with Matrix Strategy
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=5000
          MONGODB_URI=mongodb://localhost:27017/context-switcher-test
          JWT_SECRET=test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET=test-jwt-refresh-secret-key-for-ci
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          FRONTEND_URL=http://localhost:3000
          CLOUDINARY_CLOUD_NAME=test-cloud
          CLOUDINARY_API_KEY=test-api-key
          CLOUDINARY_API_SECRET=test-api-secret
          EMAIL_HOST=smtp.test.com
          EMAIL_PORT=587
          EMAIL_USER=test@test.com
          EMAIL_PASSWORD=test-password
          EMAIL_FROM=noreply@test.com
          GOOGLE_CLIENT_ID=test-google-client-id
          GOOGLE_CLIENT_SECRET=test-google-client-secret
          GOOGLE_CALLBACK_URL=http://localhost:5000/api/v1/auth/google/callback
          EOF

      - name: Run tests
        run: pnpm run test

  # Coverage Job
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=5000
          MONGODB_URI=mongodb://localhost:27017/context-switcher-test
          JWT_SECRET=test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET=test-jwt-refresh-secret-key-for-ci
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          FRONTEND_URL=http://localhost:3000
          CLOUDINARY_CLOUD_NAME=test-cloud
          CLOUDINARY_API_KEY=test-api-key
          CLOUDINARY_API_SECRET=test-api-secret
          EMAIL_HOST=smtp.test.com
          EMAIL_PORT=587
          EMAIL_USER=test@test.com
          EMAIL_PASSWORD=test-password
          EMAIL_FROM=noreply@test.com
          GOOGLE_CLIENT_ID=test-google-client-id
          GOOGLE_CLIENT_SECRET=test-google-client-secret
          GOOGLE_CALLBACK_URL=http://localhost:5000/api/v1/auth/google/callback
          EOF

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Check coverage thresholds
        run: |
          # Extract coverage percentages from coverage summary
          LINES=$(grep -oP '"lines":\{"total":\d+,"covered":\d+,"skipped":\d+,"pct":\K[\d.]+' coverage/coverage-summary.json | head -1)
          FUNCTIONS=$(grep -oP '"functions":\{"total":\d+,"covered":\d+,"skipped":\d+,"pct":\K[\d.]+' coverage/coverage-summary.json | head -1)
          BRANCHES=$(grep -oP '"branches":\{"total":\d+,"covered":\d+,"skipped":\d+,"pct":\K[\d.]+' coverage/coverage-summary.json | head -1)
          STATEMENTS=$(grep -oP '"statements":\{"total":\d+,"covered":\d+,"skipped":\d+,"pct":\K[\d.]+' coverage/coverage-summary.json | head -1)
          
          echo "Coverage Results:"
          echo "Lines: $LINES%"
          echo "Functions: $FUNCTIONS%"
          echo "Branches: $BRANCHES%"
          echo "Statements: $STATEMENTS%"
          
          # Check if coverage meets 70% threshold
          THRESHOLD=70
          FAILED=0
          
          if (( $(echo "$LINES < $THRESHOLD" | bc -l) )); then
            echo "❌ Lines coverage ($LINES%) is below threshold ($THRESHOLD%)"
            FAILED=1
          fi
          
          if (( $(echo "$FUNCTIONS < $THRESHOLD" | bc -l) )); then
            echo "❌ Functions coverage ($FUNCTIONS%) is below threshold ($THRESHOLD%)"
            FAILED=1
          fi
          
          if (( $(echo "$BRANCHES < $THRESHOLD" | bc -l) )); then
            echo "❌ Branches coverage ($BRANCHES%) is below threshold ($THRESHOLD%)"
            FAILED=1
          fi
          
          if (( $(echo "$STATEMENTS < $THRESHOLD" | bc -l) )); then
            echo "❌ Statements coverage ($STATEMENTS%) is below threshold ($THRESHOLD%)"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo "Coverage check failed!"
            exit 1
          fi
          
          echo "✅ All coverage thresholds met!"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

  # Build Job
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, coverage]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to staging server
        id: deploy
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "This is a placeholder for actual deployment script"
          echo "Configure your deployment method here:"
          echo "  - SSH deployment"
          echo "  - Docker deployment"
          echo "  - Cloud platform deployment (AWS, Azure, GCP)"
          echo "  - Platform-as-a-Service (Heroku, Render, Railway)"
          echo "url=https://staging.context-switcher.example.com" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests on staging..."
          echo "This is a placeholder for smoke tests"
          echo "Add health check and basic API tests here"
          # Example:
          # curl -f https://staging.context-switcher.example.com/api/v1/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment to staging successful!"
          echo "Staging URL: ${{ steps.deploy.outputs.url }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to staging failed!"
          exit 1
