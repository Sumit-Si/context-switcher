name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test

jobs:
  # ─── Lint Job ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

  # ─── Test Job ──────────────────────────────────────────────────────────────
  # NOTE: --env-file flag requires Node.js >= 20.6. Node 18 is NOT supported.
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # --env-file was added in Node 20.6.0. Do NOT add 18.x here.
        node-version: ["20.x", "22.x"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test environment file
        # IMPORTANT: These names MUST match the Zod schema in src/config/config.ts
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=5000
          MONGO_URI=mongodb://localhost:27017/context-switcher-test
          ACCESS_TOKEN_SECRET=test-access-secret-key-for-ci-minimum-16-chars
          ACCESS_TOKEN_EXPIRY=15m
          REFRESH_TOKEN_SECRET=test-refresh-secret-key-for-ci-minimum-16-chars
          REFRESH_TOKEN_EXPIRY=7d
          CLIENT_URL=http://localhost:3000
          SERVER_URL=http://localhost:5000
          EMAIL_HOST=smtp.test.com
          EMAIL_PORT=587
          EMAIL_USER=test@test.com
          EMAIL_PASS=test-password
          GOOGLE_CLIENT_ID=test-google-client-id
          GOOGLE_CLIENT_SECRET=test-google-client-secret
          GOOGLE_CALLBACK_URL=http://localhost:5000/api/v1/auth/google/callback
          CLOUDINARY_CLOUD_NAME=test-cloud
          CLOUDINARY_API_KEY=test-api-key
          CLOUDINARY_API_SECRET=test-api-secret
          EOF

      - name: Run tests
        run: pnpm run test

  # ─── Coverage Job ──────────────────────────────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    # Must wait for lint AND test to pass first
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=5000
          MONGO_URI=mongodb://localhost:27017/context-switcher-test
          ACCESS_TOKEN_SECRET=test-access-secret-key-for-ci-minimum-16-chars
          ACCESS_TOKEN_EXPIRY=15m
          REFRESH_TOKEN_SECRET=test-refresh-secret-key-for-ci-minimum-16-chars
          REFRESH_TOKEN_EXPIRY=7d
          CLIENT_URL=http://localhost:3000
          SERVER_URL=http://localhost:5000
          EMAIL_HOST=smtp.test.com
          EMAIL_PORT=587
          EMAIL_USER=test@test.com
          EMAIL_PASS=test-password
          GOOGLE_CLIENT_ID=test-google-client-id
          GOOGLE_CLIENT_SECRET=test-google-client-secret
          GOOGLE_CALLBACK_URL=http://localhost:5000/api/v1/auth/google/callback
          CLOUDINARY_CLOUD_NAME=test-cloud
          CLOUDINARY_API_KEY=test-api-key
          CLOUDINARY_API_SECRET=test-api-secret
          EOF

      - name: Run tests with coverage
        # vitest's built-in thresholds (in vitest.config.ts) enforce 70% minimum.
        # No need for a separate bash coverage check — vitest exits non-zero if
        # thresholds are not met, which fails this step automatically.
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

  # ─── Build Job ─────────────────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, coverage]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to staging server
        id: deploy
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Configure your deployment method here:"
          echo "  - SSH: rsync + systemctl restart"
          echo "  - Docker: docker build + docker push + docker pull on server"
          echo "  - Cloud: AWS EB / GCP Cloud Run / Azure App Service"
          echo "  - PaaS: Render / Railway / Fly.io"
          echo "url=https://staging.context-switcher.example.com" >> $GITHUB_OUTPUT

      - name: Run smoke test against staging
        run: |
          echo "🧪 Running smoke tests on staging..."
          # Uncomment and configure once staging URL is real:
          # curl -f ${{ steps.deploy.outputs.url }}/api/v1/healthCheck || exit 1

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to staging successful!"
          else
            echo "❌ Deployment to staging failed!"
            exit 1
          fi
